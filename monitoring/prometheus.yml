global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cpintel'

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'cpintel-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cpintel-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
