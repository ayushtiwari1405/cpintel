spring:
  application:
    name: cpintel-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:cpintel}
    password: ${SPRING_DATASOURCE_PASSWORD:CPIntelApp#2025}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-init-sql: "ALTER SESSION SET TIME_ZONE='UTC'"
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
        type:
          preferred_instant_jdbc_type: TIMESTAMP

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    oracle-sqlplus: false
    placeholder-replacement: false

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://cpintel_mongo:CPIntelMongo#2025@localhost:27017/cpintel?authSource=admin}
      database: cpintel
      auto-index-creation: true
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:CPIntelRedis#2025}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

jwt:
  secret: ${JWT_SECRET:cpintel_super_secret_jwt_key_change_this_in_production_min64chars_ok}
  expiry-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    com.cpintel: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

cpintel:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:4173
      - app://cpintel-desktop
  platforms:
    codeforces:
      base-url: https://codeforces.com/api
      rate-limit-ms: 500
    leetcode:
      base-url: https://leetcode.com
      graphql-url: https://leetcode.com/graphql
      rate-limit-ms: 1000
    codechef:
      base-url: https://www.codechef.com
      rate-limit-ms: 1500
  sync:
    initial-batch-size: 1000
    incremental-batch-size: 100
  cache:
    analytics-ttl-seconds: 21600
    recommendations-ttl-seconds: 86400
    unified-score-ttl-seconds: 43200
